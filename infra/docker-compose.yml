services:
  db:
    image: postgres:16
    container_name: norvexpay-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: norvexpay
      POSTGRES_USER: norvexpay
      POSTGRES_PASSWORD: norvexpay_dev_password
    ports:
      - "5432:5432"
    volumes:
      - norvexpay_pgdata:/var/lib/postgresql/data

volumes:
  norvexpay_pgdata:
